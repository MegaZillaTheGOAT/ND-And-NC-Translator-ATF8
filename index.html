<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NC / ND Currency Translator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 40px;
    }
    .converter {
        background: white;
        padding: 20px;
        max-width: 400px;
        margin: auto;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    input, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        font-size: 16px;
        box-sizing: border-box;
    }
    .result {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }
    .hint {
        font-size: 12px;
        color: #666;
        text-align: center;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="converter">
    <h2>Currency Translator</h2>

    <input type="text" id="amount" placeholder="Enter amount or expression (e.g., 45+13)" autocomplete="off">
    <div class="hint">Supports +, -, *, /, parentheses, and decimals</div>

    <select id="from">
        <option value="USD">USD</option>
        <option value="NC">NC</option>
        <option value="ND">ND</option>
    </select>

    <select id="to">
        <option value="USD">USD</option>
        <option value="NC">NC</option>
        <option value="ND">ND</option>
    </select>

    <button onclick="convert()">Convert</button>

    <div class="result" id="result"></div>
</div>

<script>
function evaluateExpression(expr) {
    // Sanitize: allow only digits, operators, parentheses, decimal points, and spaces
    const sanitized = expr.replace(/\s+/g, '');
    if (!/^[\d+\-*/().]+$/.test(sanitized)) {
        throw new Error("Invalid characters in expression");
    }
    // Use Function constructor with strict validation for safe evaluation
    try {
        // eslint-disable-next-line no-new-func
        const result = Function('"use strict"; return (' + sanitized + ')')();
        if (typeof result !== "number" || !isFinite(result)) {
            throw new Error("Invalid result");
        }
        return result;
    } catch (e) {
        throw new Error("Failed to evaluate expression");
    }
}

function convert() {
    const input = document.getElementById("amount").value.trim();
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const resultEl = document.getElementById("result");

    if (!input) {
        resultEl.innerText = "Enter a value or expression.";
        return;
    }

    let amount;
    try {
        amount = evaluateExpression(input);
    } catch (e) {
        resultEl.innerText = "Invalid expression. Use only numbers, +, -, *, /, ( ), and .";
        return;
    }

    // Conversion rates to USD
    const ratesToUSD = {
        USD: 1,
        NC: 0.33,
        ND: 33
    };

    // Convert to USD first, then to target currency
    const amountInUSD = amount * ratesToUSD[from];
    const converted = amountInUSD / ratesToUSD[to];

    resultEl.innerText = `${input} ${from} = ${converted.toFixed(2)} ${to}`;
}

// Allow Enter key to trigger conversion
document.getElementById("amount").addEventListener("keypress", function(e) {
    if (e.key === "Enter") convert();
});
</script>

</body>
</html>
